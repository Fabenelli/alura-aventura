<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aventura El Dorado</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#ececec;
    padding:20px;
}

.container-aventura{
    max-width:800px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

.estagio{
    display:none;
}

.visivel{
    display:block;
}

.opcao-escolha{
    display:block;
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#007bff;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.opcao-escolha:hover{
    background:#0056b3;
}

#mensagem{
    margin-top:15px;
    font-size:20px;
    font-weight:bold;
}

.correta{
    color:green;
}

.errada{
    color:red;
}

img{
    width:100%;
    border-radius:10px;
}

</style>
</head>
<body>

<div class="container-aventura">

    <div id="mensagem"></div>

    <!-- PASSO 0 -->
    <section class="estagio visivel" id="passo-0">

        <img src="https://thumbs.dreamstime.com/b/mapa-dos-piratas-do-tesouro-rota-com-uma-cruz-vermelha-objetivo-o-caminho-e-estrada-folha-de-papel-antiga-ilustra%C3%A7%C3%A3o-plana-178208590.jpg">

        <p>
            Durante uma pesquisa na biblioteca do colégio, encontrei um diário antigo.
        </p>

        <button class="opcao-escolha"
        data-proximo="1"
        data-resposta="correta">

        Partir rumo ao Rio de Janeiro

        </button>

        <button class="opcao-escolha"
        data-proximo="2"
        data-resposta="errada">

        Desembarcar em Pernambuco

        </button>

    </section>

    <!-- PASSO 1 -->
    <section class="estagio" id="passo-1">

        <p>
            Você decide subir a Pedra da Gávea.
        </p>

        <button class="opcao-escolha"
        data-proximo="3"
        data-resposta="correta">

        Investigar as rochas

        </button>

        <button class="opcao-escolha"
        data-proximo="4"
        data-resposta="errada">

        Voltar para casa

        </button>

    </section>

    <!-- PASSO 2 -->
    <section class="estagio" id="passo-2">

        <p>
            Você foi para Pernambuco.
        </p>

        <button class="opcao-escolha"
        data-proximo="5"
        data-resposta="correta">

        Procurar mosteiros

        </button>

    </section>

    <!-- PASSO 3 -->
    <section class="estagio" id="passo-3">

        <p>
            Você encontrou pistas na montanha.
        </p>

    </section>

    <!-- PASSO 4 -->
    <section class="estagio" id="passo-4">

        <p>
            Fim de jogo.
        </p>

    </section>

    <!-- PASSO 5 -->
    <section class="estagio" id="passo-5">

        <p>
            Você encontrou um pergaminho.
        </p>

    </section>

</div>

<script>

const botoes = document.querySelectorAll(".opcao-escolha");

const mensagem = document.getElementById("mensagem");

botoes.forEach(botao => {

    botao.addEventListener("click", () => {

        // pega resposta
        const resposta = botao.dataset.resposta;

        // mostra correta ou errada
        if(resposta === "correta"){

            mensagem.innerHTML = "✅ Resposta correta!";
            mensagem.className = "correta";

        }else{

            mensagem.innerHTML = "❌ Resposta errada!";
            mensagem.className = "errada";

        }

        // pega próximo passo
        const proximo = botao.dataset.proximo;

        // remove etapa atual
        document
        .querySelector(".visivel")
        .classList
        .remove("visivel");

        // mostra próxima etapa
        document
        .getElementById(`passo-${proximo}`)
        .classList
        .add("visivel");

    });

});

</script>

</body>
</html>
